<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}社福資源平台{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/index.css') }}">
  {% block head_extra %}{% endblock %}
  <style>
    /* small helper for container spacing */
    .main-container{width: min(1180px, calc(100% - 32px)); margin: 0 auto; padding-top: 24px;}
  </style>
</head>
<body class="app-base">
  <div class="page-bg"></div>
  <header style="background:transparent;padding:12px 24px;display:flex;align-items:center;justify-content:space-between;">
    <a href="/user" style="text-decoration:none;color:var(--text-primary);font-weight:700;">🌱 社福 AI 平台</a>
    <nav style="display:flex;gap:12px;align-items:center;">
      {% if session.get('username') %}
        <a class="button" href="/user">使用者專區</a>
        <a class="button" href="/logout">登出</a>
      {% else %}
        <a class="button" href="/login">登入</a>
        <a class="button" href="/register">註冊</a>
      {% endif %}
    </nav>
  </header>

  <main class="main-container">
    {% block content %}{% endblock %}
  </main>

  <footer style="text-align:center;padding:28px 0;color:var(--text-secondary);font-size:14px;">
    © {{ (2026) }} 社福資源平台
  </footer>

  {% block scripts %}{% endblock %}
</body>
</html>
