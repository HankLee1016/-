{% extends 'base.html' %}

{% block title %}我的資料 — 社福資源平台{% endblock %}

{% block content %}
    <div class="page-bg"></div>
    <header class="hero-card">
        <div class="hero-copy">
            <span class="eyebrow">使用者資料</span>
            <h1>👤 社福團體背景設定</h1>
            <p>請在此填寫您的團體背景與服務特色，系統會幫您保存於個人資料中。</p>
        </div>
        <div class="hero-actions">
            <a class="button" href="/user">返回使用者首頁</a>
            <a class="button button-secondary" href="/logout">登出</a>
        </div>
    </header>

    <section class="card">
        {% if success %}
            <div class="message success">✅ {{ success }}</div>
        {% endif %}
        {% if error %}
            <div class="message error">❌ {{ error }}</div>
        {% endif %}

        <div class="card-title">
            <h2 class="section-title">📋 團體基本資訊</h2>
            <p class="text-muted">更新您的社福團體背景資料</p>
        </div>

        <form class="proposal-form" method="post" action="/user/profile">
            <div style="display: grid; gap: 1.5rem;">
                <label>
                    <span class="label-text font-semibold">🏢 社福團體名稱</span>
                    <input type="text" name="org_name" value="{{ org_profile.org_name | default('') }}" placeholder="輸入團體名稱" required>
                </label>

                <label>
                    <span class="label-text font-semibold">🔢 社福團體字號</span>
                    <input type="text" name="org_id" value="{{ org_profile.org_id | default('') }}" placeholder="輸入團體字號" required>
                </label>

                <label>
                    <span class="label-text font-semibold">👥 社員人數</span>
                    <input type="number" name="member_count" value="{{ org_profile.member_count | default('') }}" placeholder="輸入社員人數">
                </label>

                <label>
                    <span class="label-text font-semibold">🕐 志工人數</span>
                    <input type="number" name="volunteer_count" value="{{ org_profile.volunteer_count | default('') }}" placeholder="輸入志工人數">
                </label>

                <label>
                    <span class="label-text font-semibold">💼 負責人</span>
                    <input type="text" name="contact_person" value="{{ org_profile.contact_person | default('') }}" placeholder="輸入負責人姓名">
                </label>

                <label>
                    <span class="label-text font-semibold">📍 登記地址</span>
                    <textarea name="address" placeholder="輸入登記地址">{{ org_profile.address | default('') }}</textarea>
                </label>
            </div>

            <div style="margin-top: 1.5rem; display: flex; gap: 1rem;">
                <button type="submit" class="button">💾 儲存資料</button>
                <a href="/user" class="button button-secondary">❌ 取消</a>
            </div>
        </form>
    </section>
{% endblock %}
