<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>新增活動</title>
    <link rel="stylesheet" href="/static/css/index.css">
    <link rel="stylesheet" href="/static/css/style.css">
    <link rel="stylesheet" href="/static/css/admin-forms.css">
</head>
<body>
    <div class="page-bg"></div>
    <div class="container">
        <header class="hero-card">
            <div class="hero-copy">
                <span class="eyebrow">活動管理</span>
                <h1>新增活動</h1>
                <p>填寫以下資訊來創建一個新活動。</p>
            </div>
            <div class="hero-actions">
                <a class="button" href="/admin/activities">返回活動列表</a>
                <a class="button" href="/logout">登出</a>
            </div>
        </header>

        <section class="card">
            <div class="card-title">
                <h2>活動資訊表單</h2>
            </div>

            {% if error %}
            <div class="error-message">{{ error }}</div>
            {% endif %}

            <form method="post" action="/admin/activities/create">
                <div class="form-group">
                    <label for="activity_name">活動名稱 <span style="color: red;">*</span></label>
                    <input type="text" id="activity_name" name="activity_name" required placeholder="輸入活動名稱">
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="category">活動分類</label>
                        <select id="category" name="category">
                            <option value="其他">其他</option>
                            <option value="講座">講座</option>
                            <option value="工作坊">工作坊</option>
                            <option value="志工服務">志工服務</option>
                            <option value="社區活動">社區活動</option>
                            <option value="訓練課程">訓練課程</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="status">狀態</label>
                        <select id="status" name="status">
                            <option value="進行中" selected>進行中</option>
                            <option value="已結束">已結束</option>
                            <option value="已取消">已取消</option>
                        </select>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="start_date">開始日期</label>
                        <input type="date" id="start_date" name="start_date">
                    </div>
                    <div class="form-group">
                        <label for="end_date">結束日期</label>
                        <input type="date" id="end_date" name="end_date">
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="location">活動地點 <span style="color: red;">*</span></label>
                        <input type="text" id="location" name="location" required placeholder="輸入活動地點">
                    </div>
                    <div class="form-group">
                        <label for="max_capacity">活動名額</label>
                        <input type="number" id="max_capacity" name="max_capacity" placeholder="輸入最大參加人數" min="0" value="0">
                    </div>
                </div>

                <div class="form-group">
                    <label for="registration_deadline">報名截止日期</label>
                    <input type="date" id="registration_deadline" name="registration_deadline">
                </div>

                <div class="form-group">
                    <label for="description">活動描述</label>
                    <textarea id="description" name="description" placeholder="詳細描述此活動的內容、目的和說明..."></textarea>
                </div>

                <div class="form-actions">
                    <button type="submit" style="background-color: var(--primary); color: white;">保存活動</button>
                    <a href="/admin/activities" style="background-color: var(--text-secondary); color: white; text-align: center;">取消</a>
                </div>
            </form>
        </section>
    </div>
</body>
</html>
