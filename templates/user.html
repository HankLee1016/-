<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>使用者畫面</title>
    <link rel="stylesheet" href="/static/css/index.css">
</head>
<body>
    <div class="page-bg"></div>
    <div class="container">
        <header class="hero-card">
            <div class="hero-copy">
                <span class="eyebrow">使用者專區</span>
                <h1>歡迎，{{ username or '使用者' }}</h1>
                <p>這裡是一般使用者畫面，您可以瀏覽公共資訊與服務內容。</p>
            </div>
            <div class="hero-actions">
                <a class="button" href="/logout">登出</a>
            </div>
        </header>

        <section class="card">
            <div class="card-title">
                <h2>使用者內容</h2>
                <span>您可以在此頁面查看系統提供的社會輔助相關資訊。</span>
            </div>
            <ul>
                <li>最新消息</li>
                <li>服務介紹</li>
                <li>聯絡方式</li>
            </ul>
        </section>
    </div>
</body>
</html>
