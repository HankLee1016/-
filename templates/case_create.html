{% extends 'base.html' %}

{% block title %}新增個案 — 社福資源平台{% endblock %}

{% block content %}
    <div class="page-bg"></div>
    <header class="hero-card">
        <div class="hero-copy">
            <span class="eyebrow">個案管理</span>
            <h1>➕ 新增個案</h1>
            <p>填寫以下資訊來創建一個新的個案，系統將協助追蹤服務進度。</p>
        </div>
        <div class="hero-actions">
            <a class="button button-secondary" href="/admin/cases">返回個案列表</a>
            <a class="button button-secondary" href="/logout">登出</a>
        </div>
    </header>

    <section class="card">
        <div class="card-title">
            <h2 class="section-title">📋 個案基本資訊</h2>
            <p class="text-muted">填寫個案詳細資料</p>
        </div>

        {% if error %}
            <div class="message error">❌ {{ error }}</div>
        {% endif %}

        <form method="post" action="/admin/cases/create">
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem;">
                <label>
                    <span class="label-text font-semibold">📝 個案名稱 <span style="color: #ef4444;">*</span></span>
                    <input type="text" name="case_name" required placeholder="輸入個案名稱">
                </label>
                <label>
                    <span class="label-text font-semibold">👤 成員名稱 <span style="color: #ef4444;">*</span></span>
                    <input type="text" name="member_name" required placeholder="輸入成員名稱">
                </label>
            </div>

            <label style="margin-top: 1.5rem;">
                <span class="label-text font-semibold">📄 問題描述</span>
                <textarea name="issue_description" placeholder="詳細描述此個案的主要問題和背景..."></textarea>
            </label>

            <label style="margin-top: 1.5rem;">
                <span class="label-text font-semibold">🏷️ 狀態</span>
                <select name="status">
                    <option value="待處理">⏳ 待處理</option>
                    <option value="進行中" selected>🔵 進行中</option>
                    <option value="已結案">✅ 已結案</option>
                </select>
            </label>

            <div style="display: flex; gap: 1rem; margin-top: 1.5rem;">
                <button type="submit" class="button">💾 保存個案</button>
                <a href="/admin/cases" class="button button-secondary">❌ 取消</a>
            </div>
        </form>
    </section>
{% endblock %}
