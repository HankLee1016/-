{% extends 'base.html' %}

{% block title %}個案工作流 - 系統{% endblock %}

{% block content %}
<div class="main-container">
    <div id="caseContent">
        <div style="text-align: center; padding: 2rem; color: var(--text-secondary);">
            載入中...
        </div>
    </div>
</div>

<style>
.case-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 2rem;
    padding-bottom: 1rem;
    border-bottom: 1px solid var(--border-color);
}

.case-header-info h1 {
    margin: 0 0 0.5rem 0;
    color: var(--text-primary);
}

.case-meta-info {
    display: flex;
    flex-wrap: wrap;
    gap: 1.5rem;
    margin-top: 1rem;
}

.case-meta-item {
    display: flex;
    flex-direction: column;
}

.case-meta-label {
    font-size: 0.85rem;
    color: var(--text-secondary);
    margin-bottom: 0.25rem;
}

.case-meta-value {
    font-weight: 600;
    color: var(--text-primary);
}

.status-badge {
    display: inline-block;
    padding: 0.4rem 1rem;
    border-radius: 6px;
    font-weight: 600;
    font-size: 0.9rem;
}

.status-待處理 { background: #fff3cd; color: #856404; }
.status-進行中 { background: #d1ecf1; color: #0c5460; }
.status-已完成 { background: #d4edda; color: #155724; }
.status-已關閉 { background: #e2e3e5; color: #383d41; }

.priority-低 { background: #d4edda; color: #155724; }
.priority-中 { background: #fff3cd; color: #856404; }
.priority-高 { background: #f8d7da; color: #721c24; }
.priority-緊急 { background: #f5c6cb; color: #721c24; font-weight: 700; }

.priority-badge {
    display: inline-block;
    padding: 0.4rem 1rem;
    border-radius: 6px;
    font-weight: 600;
    font-size: 0.9rem;
}

.card {
    background: var(--surface-soft);
    border-radius: 12px;
    padding: 1.5rem;
    border: 1px solid var(--border-color);
    margin-bottom: 1.5rem;
}

.card h2 {
    margin: 0 0 1rem 0;
    color: var(--text-primary);
    font-size: 1.2rem;
}

.description {
    color: var(--text-secondary);
    line-height: 1.6;
}

.timeline {
    display: flex;
    flex-direction: column;
    gap: 1rem;
}

.timeline-item {
    display: flex;
    gap: 1rem;
    padding-bottom: 1rem;
    border-bottom: 1px solid var(--border-color);
}

.timeline-item:last-child {
    border-bottom: none;
}

.timeline-dot {
    width: 12px;
    height: 12px;
    background: var(--primary);
    border-radius: 50%;
    margin-top: 0.4rem;
    flex-shrink: 0;
}

.timeline-content {
    flex-grow: 1;
}

.timeline-date {
    font-size: 0.85rem;
    color: var(--text-secondary);
    margin-bottom: 0.25rem;
}

.timeline-action {
    font-weight: 600;
    color: var(--text-primary);
}

.timeline-details {
    font-size: 0.9rem;
    color: var(--text-secondary);
    margin-top: 0.25rem;
}

.timeline-user {
    color: var(--primary);
    font-weight: 500;
}

.status-update-form {
    background: var(--surface-base);
    padding: 1rem;
    border-radius: 8px;
    border: 1px solid var(--border-color);
}

.form-group {
    margin-bottom: 1rem;
}

.form-group label {
    display: block;
    margin-bottom: 0.5rem;
    font-weight: 500;
    color: var(--text-primary);
    font-size: 0.95rem;
}

.form-control {
    width: 100%;
    padding: 0.6rem 0.8rem;
    border: 1px solid var(--border-color);
    border-radius: 6px;
    background: var(--surface-soft);
    color: var(--text-primary);
    font-size: 0.95rem;
    transition: border-color 0.2s;
}

.form-control:focus {
    outline: none;
    border-color: var(--primary);
    box-shadow: 0 0 0 3px rgba(var(--primary-rgb), 0.1);
}

.textarea {
    resize: vertical;
    min-height: 100px;
}

.form-actions {
    display: flex;
    gap: 1rem;
    margin-top: 1rem;
}

.btn {
    padding: 0.6rem 1.2rem;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    font-weight: 500;
    transition: all 0.2s;
    font-size: 0.95rem;
}

.btn-primary {
    background: var(--primary);
    color: white;
}

.btn-primary:hover {
    opacity: 0.9;
    transform: translateY(-1px);
}

.btn-secondary {
    background: transparent;
    border: 1px solid var(--border-color);
    color: var(--text-secondary);
}

.btn-secondary:hover {
    background: var(--surface-base);
    border-color: var(--primary);
    color: var(--primary);
}
</style>

<script>
async function loadCaseWorkflow() {
    const caseId = window.location.pathname.split('/')[2];
    
    try {
        const response = await fetch(`/cases/${caseId}/workflow-data`);
        if (!response.ok) throw new Error('載入失敗');
        
        const data = await response.json();
        displayCaseWorkflow(data.case, data.history);
    } catch (error) {
        console.error('載入個案失敗:', error);
        document.getElementById('caseContent').innerHTML = 
            '<div style="text-align: center; padding: 2rem; color: var(--error-color);">載入失敗</div>';
    }
}

function displayCaseWorkflow(caseItem, history) {
    const statusBadge = `<span class="status-badge status-${caseItem.status}">${caseItem.status || '未知'}</span>`;
    const priorityBadge = `<span class="priority-badge priority-${caseItem.priority}">${caseItem.priority || '未設定'}</span>`;
    
    const historyHtml = history.map(log => `
        <div class="timeline-item">
            <div class="timeline-dot"></div>
            <div class="timeline-content">
                <div class="timeline-date">${formatDate(log.created_at)}</div>
                <div class="timeline-action">${log.action}</div>
                <div class="timeline-details">
                    狀態: <strong>${log.old_status} → ${log.new_status}</strong><br>
                    <span class="timeline-user">由 ${log.user_name || '系統'} 修改</span>
                </div>
                ${log.notes ? `<div class="timeline-details">備註: ${log.notes}</div>` : ''}
            </div>
        </div>
    `).join('');

    const html = `
        <div class="case-header">
            <div class="case-header-info">
                <h1>${caseItem.title || '個案'}</h1>
                <div class="case-meta-info">
                    <div class="case-meta-item">
                        <span class="case-meta-label">狀態</span>
                        <div class="case-meta-value">${statusBadge}</div>
                    </div>
                    <div class="case-meta-item">
                        <span class="case-meta-label">優先級</span>
                        <div class="case-meta-value">${priorityBadge}</div>
                    </div>
                    <div class="case-meta-item">
                        <span class="case-meta-label">指派給</span>
                        <div class="case-meta-value">${caseItem.assigned_to || '未指派'}</div>
                    </div>
                    <div class="case-meta-item">
                        <span class="case-meta-label">建立日期</span>
                        <div class="case-meta-value">${formatDate(caseItem.created_at)}</div>
                    </div>
                </div>
            </div>
        </div>

        <div class="card">
            <h2>個案描述</h2>
            <div class="description">${caseItem.description || '暫無描述'}</div>
        </div>

        <div class="card">
            <h2>時間軸</h2>
            <div class="timeline">
                ${historyHtml || '<p style="color: var(--text-secondary);">暫無變更記錄</p>'}
            </div>
        </div>

        <div class="card">
            <h2>更新狀態</h2>
            <form id="statusUpdateForm" class="status-update-form">
                <div class="form-group">
                    <label for="newStatus">新狀態</label>
                    <select id="newStatus" class="form-control" required>
                        <option value="">選擇狀態</option>
                        <option value="待處理">待處理</option>
                        <option value="進行中">進行中</option>
                        <option value="已完成">已完成</option>
                        <option value="已關閉">已關閉</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="updateNotes">備註</label>
                    <textarea id="updateNotes" class="form-control textarea" placeholder="輸入狀態更新的備註..."></textarea>
                </div>

                <div class="form-actions">
                    <button type="submit" class="btn btn-primary">更新狀態</button>
                    <button type="reset" class="btn btn-secondary">重設</button>
                </div>
            </form>
        </div>
    `;

    document.getElementById('caseContent').innerHTML = html;

    document.getElementById('statusUpdateForm').addEventListener('submit', function(e) {
        e.preventDefault();
        updateStatus(caseId);
    });
}

async function updateStatus(caseId) {
    const newStatus = document.getElementById('newStatus').value;
    const notes = document.getElementById('updateNotes').value;

    if (!newStatus) {
        alert('請選擇新狀態');
        return;
    }

    try {
        const response = await fetch(`/api/cases/${caseId}/status`, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({status: newStatus, notes})
        });

        if (response.ok) {
            alert('狀態已更新');
            loadCaseWorkflow();
        } else {
            alert('更新失敗');
        }
    } catch (error) {
        console.error('更新失敗:', error);
        alert('更新失敗: ' + error.message);
    }
}

function formatDate(dateString) {
    const date = new Date(dateString);
    return date.toLocaleDateString('zh-HK', {
        year: 'numeric',
        month: '2-digit',
        day: '2-digit',
        hour: '2-digit',
        minute: '2-digit'
    });
}

document.addEventListener('DOMContentLoaded', loadCaseWorkflow);
</script>
{% endblock %}
