{% extends 'base.html' %}

{% block title %}編輯個案 — 社福資源平台{% endblock %}

{% block content %}
    <div class="page-bg"></div>
    <header class="hero-card">
        <div class="hero-copy">
            <span class="eyebrow">個案管理</span>
            <h1>✏️ 編輯個案</h1>
            <p>更新個案資訊並追蹤服務進度。</p>
        </div>
        <div class="hero-actions">
            <a class="button button-secondary" href="/admin/cases">返回個案列表</a>
            <a class="button button-secondary" href="/logout">登出</a>
        </div>
    </header>

    <section class="card">
        <div class="card-title">
            <h2 class="section-title">📋 個案編輯表單</h2>
            <p class="text-muted">更新個案詳細資料</p>
        </div>

        {% if error %}
            <div class="message error">❌ {{ error }}</div>
        {% endif %}

        {% if case %}
            <div style="
                background: linear-gradient(135deg, #f0f4ff, #e0e7ff);
                padding: 1rem;
                border-radius: 8px;
                border-left: 4px solid var(--primary);
                margin-bottom: 1.5rem;
            ">
                <p style="margin: 0; color: var(--text-secondary);">
                    <span class="font-semibold">🆔 個案代碼：</span> <code style="background: rgba(255,255,255,0.5); padding: 0.25rem 0.5rem; border-radius: 4px;">{{ case.id }}</code>
                </p>
            </div>

            <form method="post" action="/admin/cases/{{ case.id }}/edit">
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem;">
                    <label>
                        <span class="label-text font-semibold">📝 個案名稱 <span style="color: #ef4444;">*</span></span>
                        <input type="text" name="case_name" required placeholder="輸入個案名稱" value="{{ case.case_name }}">
                    </label>
                    <label>
                        <span class="label-text font-semibold">👤 成員名稱 <span style="color: #ef4444;">*</span></span>
                        <input type="text" name="member_name" required placeholder="輸入成員名稱" value="{{ case.member_name }}">
                    </label>
                </div>

                <label style="margin-top: 1.5rem;">
                    <span class="label-text font-semibold">📄 問題描述</span>
                    <textarea name="issue_description" placeholder="詳細描述此個案的主要問題和背景...">{{ case.issue_description }}</textarea>
                </label>

                <label style="margin-top: 1.5rem;">
                    <span class="label-text font-semibold">🏷️ 狀態</span>
                    <select name="status">
                        <option value="待處理" {% if case.status == '待處理' %}selected{% endif %}>⏳ 待處理</option>
                        <option value="進行中" {% if case.status == '進行中' %}selected{% endif %}>🔵 進行中</option>
                        <option value="已結案" {% if case.status == '已結案' %}selected{% endif %}>✅ 已結案</option>
                    </select>
                </label>

                <div style="display: flex; gap: 1rem; margin-top: 1.5rem;">
                    <button type="submit" class="button">💾 更新個案</button>
                    <a href="/admin/cases" class="button button-secondary">❌ 取消</a>
                </div>
            </form>
        {% else %}
            <div class="empty-state">
                <p class="text-muted">個案不存在</p>
                <a class="button mt-3" href="/admin/cases" style="margin-top: 1rem;">返回個案列表</a>
            </div>
        {% endif %}
    </section>
{% endblock %}
