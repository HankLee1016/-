<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>編輯個案</title>
    <link rel="stylesheet" href="/static/css/index.css">
    <style>
        .form-group {
            margin-bottom: 24px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: var(--text-primary);
        }
        input[type="text"],
        textarea,
        select {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-family: 'Noto Sans TC', 'Segoe UI', Arial, sans-serif;
            font-size: 1rem;
            color: var(--text-primary);
            background-color: var(--surface);
            transition: border-color 0.2s;
        }
        input[type="text"]:focus,
        textarea:focus,
        select:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(47, 128, 237, 0.1);
        }
        textarea {
            resize: vertical;
            min-height: 120px;
        }
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 24px;
        }
        @media (max-width: 640px) {
            .form-row {
                grid-template-columns: 1fr;
            }
        }
        .form-actions {
            display: flex;
            gap: 12px;
            justify-content: flex-start;
        }
        .form-actions .button {
            padding: 10px 20px;
            text-decoration: none;
            cursor: pointer;
        }
        .error-message {
            background-color: #ffebee;
            color: #c62828;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
        }
        .case-id-info {
            background-color: var(--surface-soft);
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 24px;
            font-size: 0.9rem;
            color: var(--text-secondary);
        }
    </style>
</head>
<body>
    <div class="page-bg"></div>
    <div class="container">
        <header class="hero-card">
            <div class="hero-copy">
                <span class="eyebrow">個案管理</span>
                <h1>編輯個案</h1>
                <p>更新個案資訊。</p>
            </div>
            <div class="hero-actions">
                <a class="button" href="/admin/cases">返回個案列表</a>
                <a class="button" href="/logout">登出</a>
            </div>
        </header>

        <section class="card">
            <div class="card-title">
                <h2>個案編輯表單</h2>
            </div>

            {% if error %}
            <div class="error-message">{{ error }}</div>
            {% endif %}

            {% if case %}
            <div class="case-id-info">
                <strong>個案代碼:</strong> {{ case.id }}
            </div>

            <form method="post" action="/admin/cases/{{ case.id }}/edit">
                <div class="form-row">
                    <div class="form-group">
                        <label for="case_name">個案名稱 <span style="color: red;">*</span></label>
                        <input type="text" id="case_name" name="case_name" required placeholder="輸入個案名稱" value="{{ case.case_name }}">
                    </div>
                    <div class="form-group">
                        <label for="member_name">成員名稱 <span style="color: red;">*</span></label>
                        <input type="text" id="member_name" name="member_name" required placeholder="輸入成員名稱" value="{{ case.member_name }}">
                    </div>
                </div>

                <div class="form-group">
                    <label for="issue_description">問題描述</label>
                    <textarea id="issue_description" name="issue_description" placeholder="詳細描述此個案的主要問題和背景...">{{ case.issue_description }}</textarea>
                </div>

                <div class="form-group">
                    <label for="status">狀態</label>
                    <select id="status" name="status">
                        <option value="待處理" {% if case.status == '待處理' %}selected{% endif %}>待處理</option>
                        <option value="進行中" {% if case.status == '進行中' %}selected{% endif %}>進行中</option>
                        <option value="已結案" {% if case.status == '已結案' %}selected{% endif %}>已結案</option>
                    </select>
                </div>

                <div class="form-actions">
                    <button type="submit" class="button" style="background-color: var(--primary); color: white; border: none; cursor: pointer;">更新個案</button>
                    <a class="button" href="/admin/cases" style="background-color: var(--text-secondary); color: white; text-align: center;">取消</a>
                </div>
            </form>
            {% else %}
            <p>個案不存在。</p>
            <a class="button" href="/admin/cases">返回個案列表</a>
            {% endif %}
        </section>
    </div>
</body>
</html>
