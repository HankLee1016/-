{% extends 'base.html' %}

{% block title %}備份管理 - 系統{% endblock %}

{% block content %}
<div class="main-container">
    <div class="page-header">
        <h1>備份管理</h1>
        <button onclick="createBackup()" class="btn btn-primary">建立備份</button>
    </div>

    <!-- 備份統計 -->
    <div class="stats-grid">
        <div class="stat-card">
            <div class="stat-label">總備份數</div>
            <div class="stat-value" id="totalBackups">-</div>
        </div>
        <div class="stat-card">
            <div class="stat-label">最後備份</div>
            <div class="stat-value" id="lastBackup">-</div>
        </div>
        <div class="stat-card">
            <div class="stat-label">使用空間</div>
            <div class="stat-value" id="totalSize">-</div>
        </div>
    </div>

    <!-- 備份列表 -->
    <div class="card">
        <h2>備份列表</h2>
        <div id="backupsList" style="margin-top: 1rem;">
            <div style="text-align: center; padding: 2rem; color: var(--text-secondary);">
                載入中...
            </div>
        </div>
    </div>
</div>

<style>
.page-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 2rem;
    padding: 0 1rem;
}

.page-header h1 {
    margin: 0;
}

.btn {
    padding: 0.6rem 1.2rem;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    font-weight: 500;
    transition: all 0.2s;
}

.btn-primary {
    background: var(--primary);
    color: white;
}

.btn-primary:hover {
    opacity: 0.9;
    transform: translateY(-1px);
}

.btn-sm {
    padding: 0.4rem 0.8rem;
    font-size: 0.85rem;
}

.btn-secondary {
    background: transparent;
    border: 1px solid var(--border-color);
    color: var(--text-secondary);
}

.btn-secondary:hover {
    background: var(--surface-base);
    border-color: var(--primary);
    color: var(--primary);
}

.btn-danger {
    background: transparent;
    border: 1px solid #f44336;
    color: #f44336;
}

.btn-danger:hover {
    background: #f44336;
    color: white;
}

.stats-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 1.5rem;
    margin-bottom: 2rem;
}

.stat-card {
    background: var(--surface-soft);
    border-radius: 12px;
    padding: 1.5rem;
    border: 1px solid var(--border-color);
    text-align: center;
}

.stat-label {
    font-size: 0.9rem;
    color: var(--text-secondary);
    margin-bottom: 0.5rem;
}

.stat-value {
    font-size: 1.8rem;
    font-weight: 700;
    color: var(--text-primary);
}

.card {
    background: var(--surface-soft);
    border-radius: 12px;
    padding: 1.5rem;
    border: 1px solid var(--border-color);
}

.card h2 {
    margin: 0 0 1rem 0;
    color: var(--text-primary);
}

.backup-item {
    padding: 1rem;
    border: 1px solid var(--border-color);
    border-radius: 8px;
    margin-bottom: 1rem;
    display: flex;
    justify-content: space-between;
    align-items: center;
    transition: all 0.2s;
}

.backup-item:hover {
    background: var(--surface-base);
    border-color: var(--primary);
}

.backup-info {
    flex-grow: 1;
}

.backup-name {
    font-weight: 600;
    color: var(--text-primary);
    margin-bottom: 0.25rem;
}

.backup-meta {
    display: flex;
    gap: 1.5rem;
    font-size: 0.85rem;
    color: var(--text-secondary);
    margin-top: 0.25rem;
}

.backup-actions {
    display: flex;
    gap: 0.5rem;
}

.no-backups {
    text-align: center;
    padding: 2rem;
    color: var(--text-secondary);
}

.status-success {
    display: inline-block;
    width: 10px;
    height: 10px;
    background: #4CAF50;
    border-radius: 50%;
    margin-right: 0.5rem;
}

.status-failed {
    display: inline-block;
    width: 10px;
    height: 10px;
    background: #f44336;
    border-radius: 50%;
    margin-right: 0.5rem;
}
</style>

<script>
async function loadBackups() {
    try {
        const response = await fetch('/admin/backups/list');
        const data = await response.json();
        
        displayBackups(data.backups || []);
        updateStats(data.backups || []);
    } catch (error) {
        console.error('載入備份列表失敗:', error);
        document.getElementById('backupsList').innerHTML = 
            '<div class="no-backups" style="color: var(--error-color);">載入失敗</div>';
    }
}

function updateStats(backups) {
    document.getElementById('totalBackups').textContent = backups.length;
    
    if (backups.length > 0) {
        const lastBackup = new Date(backups[0].created_at);
        document.getElementById('lastBackup').textContent = 
            lastBackup.toLocaleDateString('zh-HK', {year: 'numeric', month: '2-digit', day: '2-digit'});
        
        const totalSize = backups.reduce((sum, b) => sum + (b.size_mb || 0), 0);
        document.getElementById('totalSize').textContent = totalSize > 0 ? totalSize.toFixed(2) + ' MB' : '-';
    }
}

function displayBackups(backups) {
    const container = document.getElementById('backupsList');
    
    if (backups.length === 0) {
        container.innerHTML = '<div class="no-backups">尚無備份</div>';
        return;
    }

    const html = backups.map(backup => `
        <div class="backup-item">
            <div class="backup-info">
                <div class="backup-name">
                    <span class="status-${backup.status === 'success' ? 'success' : 'failed'}"></span>
                    ${backup.name || '備份'}
                </div>
                <div class="backup-meta">
                    <span>日期: ${formatDate(backup.created_at)}</span>
                    <span>大小: ${backup.size_mb ? backup.size_mb.toFixed(2) + ' MB' : '未知'}</span>
                    <span>狀態: ${backup.status === 'success' ? '成功' : '失敗'}</span>
                </div>
            </div>
            <div class="backup-actions">
                ${backup.status === 'success' ? `
                    <button class="btn btn-sm btn-secondary" onclick="restoreBackup('${backup.id}')">還原</button>
                    <button class="btn btn-sm btn-secondary" onclick="downloadBackup('${backup.id}')">下載</button>
                ` : ''}
                <button class="btn btn-sm btn-danger" onclick="deleteBackup('${backup.id}')">刪除</button>
            </div>
        </div>
    `).join('');

    container.innerHTML = html;
}

async function createBackup() {
    try {
        const response = await fetch('/admin/backups/create', { method: 'POST' });
        if (response.ok) {
            alert('備份已建立');
            loadBackups();
        } else {
            alert('建立備份失敗');
        }
    } catch (error) {
        console.error('建立備份失敗:', error);
    }
}

async function restoreBackup(backupId) {
    if (!confirm('確認要還原此備份嗎？此操作無法撤銷。')) return;
    
    try {
        const response = await fetch(`/admin/backups/${backupId}/restore`, { method: 'POST' });
        if (response.ok) {
            alert('備份已還原');
            loadBackups();
        } else {
            alert('還原失敗');
        }
    } catch (error) {
        console.error('還原失敗:', error);
    }
}

async function downloadBackup(backupId) {
    window.location.href = `/admin/backups/${backupId}/download`;
}

async function deleteBackup(backupId) {
    if (!confirm('確認刪除此備份嗎？')) return;
    
    try {
        const response = await fetch(`/admin/backups/${backupId}`, { method: 'DELETE' });
        if (response.ok) {
            alert('備份已刪除');
            loadBackups();
        } else {
            alert('刪除失敗');
        }
    } catch (error) {
        console.error('刪除失敗:', error);
    }
}

function formatDate(dateString) {
    const date = new Date(dateString);
    return date.toLocaleDateString('zh-HK', {
        year: 'numeric',
        month: '2-digit',
        day: '2-digit',
        hour: '2-digit',
        minute: '2-digit'
    });
}

document.addEventListener('DOMContentLoaded', loadBackups);
</script>
{% endblock %}
