<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>編輯內容</title>
    <link rel="stylesheet" href="/static/css/index.css">
    <style>
        .form-group {
            margin-bottom: 24px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: var(--text-primary);
        }
        input[type="text"],
        input[type="url"],
        textarea,
        select {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-family: 'Noto Sans TC', 'Segoe UI', Arial, sans-serif;
            font-size: 1rem;
            color: var(--text-primary);
            background-color: var(--surface);
            transition: border-color 0.2s;
        }
        input[type="text"]:focus,
        input[type="url"]:focus,
        textarea:focus,
        select:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(47, 128, 237, 0.1);
        }
        textarea {
            resize: vertical;
            min-height: 200px;
        }
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 24px;
        }
        @media (max-width: 640px) {
            .form-row {
                grid-template-columns: 1fr;
            }
        }
        .form-actions {
            display: flex;
            gap: 12px;
            justify-content: flex-start;
        }
        .form-actions button,
        .form-actions a {
            padding: 10px 20px;
            text-decoration: none;
            cursor: pointer;
            border: none;
            border-radius: 8px;
        }
        .error-message {
            background-color: #ffebee;
            color: #c62828;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
        }
        .content-id-info {
            background-color: var(--surface-soft);
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 24px;
            font-size: 0.9rem;
            color: var(--text-secondary);
        }
    </style>
</head>
<body>
    <div class="page-bg"></div>
    <div class="container">
        <header class="hero-card">
            <div class="hero-copy">
                <span class="eyebrow">內容管理</span>
                <h1>編輯內容</h1>
                <p>更新內容資訊。</p>
            </div>
            <div class="hero-actions">
                <a class="button" href="/admin/contents">返回內容列表</a>
                <a class="button" href="/logout">登出</a>
            </div>
        </header>

        <section class="card">
            <div class="card-title">
                <h2>內容編輯表單</h2>
            </div>

            {% if error %}
            <div class="error-message">{{ error }}</div>
            {% endif %}

            {% if content %}
            <div class="content-id-info">
                <strong>內容代碼:</strong> {{ content.id }}
            </div>

            <form method="post" action="/admin/contents/{{ content.id }}/edit">
                <div class="form-group">
                    <label for="title">標題 <span style="color: red;">*</span></label>
                    <input type="text" id="title" name="title" required placeholder="輸入內容標題" value="{{ content.title }}">
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="category">分類</label>
                        <select id="category" name="category">
                            <option value="其他" {% if content.category == '其他' %}selected{% endif %}>其他</option>
                            <option value="新聞" {% if content.category == '新聞' %}selected{% endif %}>新聞</option>
                            <option value="通知" {% if content.category == '通知' %}selected{% endif %}>通知</option>
                            <option value="活動" {% if content.category == '活動' %}selected{% endif %}>活動</option>
                            <option value="文章" {% if content.category == '文章' %}selected{% endif %}>文章</option>
                            <option value="指南" {% if content.category == '指南' %}selected{% endif %}>指南</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="status">狀態</label>
                        <select id="status" name="status">
                            <option value="已發佈" {% if content.status == '已發佈' %}selected{% endif %}>已發佈</option>
                            <option value="草稿" {% if content.status == '草稿' %}selected{% endif %}>草稿</option>
                        </select>
                    </div>
                </div>

                <div class="form-group">
                    <label for="content">內容 <span style="color: red;">*</span></label>
                    <textarea id="content" name="content" required placeholder="輸入內容...">{{ content.content }}</textarea>
                </div>

                <div class="form-group">
                    <label for="image_url">圖片 URL（選填）</label>
                    <input type="url" id="image_url" name="image_url" placeholder="https://example.com/image.jpg" value="{{ content.image_url }}">
                </div>

                <div class="form-actions">
                    <button type="submit" style="background-color: var(--primary); color: white;">更新內容</button>
                    <a href="/admin/contents" style="background-color: var(--text-secondary); color: white; text-align: center;">取消</a>
                </div>
            </form>
            {% else %}
            <p>內容不存在。</p>
            <a class="button" href="/admin/contents">返回內容列表</a>
            {% endif %}
        </section>
    </div>
</body>
</html>
