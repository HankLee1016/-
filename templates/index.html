{% extends 'base.html' %}

{% block title %}首頁 — 社福資源平台{% endblock %}

{% block content %}
    <div class="page-bg"></div>
    <header class="hero-card">
        <div class="hero-copy">
            <span class="eyebrow">社會輔助團體</span>
            <h1>🌱 歡迎來到社福資源平台</h1>
            <p>一站式社福企劃和資源媒合平台，幫助您更好地服務社區。</p>
        </div>
        <div class="hero-actions">
            <a class="button" href="/login">🔓 登入帳號</a>
            <a class="button button-secondary" href="/register">📝 建立帳號</a>
        </div>
    </header>

    <section class="card">
        <div class="card-title">
            <h2 class="section-title">💡 核心特色</h2>
            <p class="text-muted">為社福機構提供完整的digital solution</p>
        </div>
        
        <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1.5rem;">
            <div style="
                text-align: center;
                padding: 2rem 1.5rem;
                background: linear-gradient(135deg, #eff6ff 0%, #dbeafe 100%);
                border-radius: 12px;
                border: 2px solid var(--primary-light);
            ">
                <div style="font-size: 2.5rem; margin-bottom: 0.75rem;">📋</div>
                <h3 style="margin: 0 0 0.5rem 0; color: var(--primary);">企劃協助</h3>
                <p style="margin: 0; font-size: 0.9rem; color: var(--text-secondary);">AI 驅動的企劃書生成</p>
            </div>

            <div style="
                text-align: center;
                padding: 2rem 1.5rem;
                background: linear-gradient(135deg, #fef3c7 0%, #fde68a 100%);
                border-radius: 12px;
                border: 2px solid #fcd34d;
            ">
                <div style="font-size: 2.5rem; margin-bottom: 0.75rem;">💰</div>
                <h3 style="margin: 0 0 0.5rem 0; color: #b45309;">補助查詢</h3>
                <p style="margin: 0; font-size: 0.9rem; color: var(--text-secondary);">整合各項補助資訊</p>
            </div>

            <div style="
                text-align: center;
                padding: 2rem 1.5rem;
                background: linear-gradient(135deg, #ecfdf5 0%, #d1fae5 100%);
                border-radius: 12px;
                border: 2px solid #a7f3d0;
            ">
                <div style="font-size: 2.5rem; margin-bottom: 0.75rem;">🎯</div>
                <h3 style="margin: 0 0 0.5rem 0; color: #047857;">營運管理</h3>
                <p style="margin: 0; font-size: 0.9rem; color: var(--text-secondary);">活動、志工、成員管理</p>
            </div>
        </div>
    </section>
{% endblock %}
