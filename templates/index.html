<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>社會輔助團體</title>
    <link rel="stylesheet" href="/static/css/index.css">
</head>
<body>
    <div class="page-bg"></div>

    <div class="container">
        <header class="hero-card">
            <div class="hero-copy">
                <span class="eyebrow">社會輔助團體</span>
                <h1>歡迎來到社會輔助平台</h1>
                <p>請先登入或註冊，依照您的身分進入使用者畫面或管理者後台。</p>
            </div>
            <div class="hero-actions">
                <a class="button" href="/login">登入</a>
                <a class="button" href="/register">註冊</a>
            </div>
        </header>

        <section class="card">
            <div class="card-title">
                <h2>帳號功能</h2>
                <span>登入後依身分獲得不同權限。</span>
            </div>
            <p>服務說明：</p>
            <ul>
                <li><strong>一般使用者</strong>：瀏覽公共資訊與輔助服務內容。</li>
                <li><strong>管理者</strong>：進入後台管理系統、查看捐款資料。</li>
            </ul>
        </section>
    </div>
</body>
</html>
