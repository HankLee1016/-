<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>編輯公告</title>
    <link rel="stylesheet" href="/static/css/index.css">
    <link rel="stylesheet" href="/static/css/style.css">
    <link rel="stylesheet" href="/static/css/admin-forms.css">
</head>
<body>
    <div class="page-bg"></div>
    <div class="container">
        <header class="hero-card">
            <div class="hero-copy">
                <span class="eyebrow">公告管理</span>
                <h1>編輯公告</h1>
                <p>更新公告資訊。</p>
            </div>
            <div class="hero-actions">
                <a class="button" href="/admin/announcements">返回公告列表</a>
                <a class="button" href="/logout">登出</a>
            </div>
        </header>

        <section class="card">
            <div class="card-title">
                <h2>公告編輯表單</h2>
            </div>

            {% if error %}
            <div class="error-message">{{ error }}</div>
            {% endif %}

            {% if announcement %}
            <div class="announcement-id-info">
                <strong>公告代碼:</strong> {{ announcement.id }}
            </div>

            <form method="post" action="/admin/announcements/{{ announcement.id }}/edit">
                <div class="form-group">
                    <label for="title">標題 <span style="color: red;">*</span></label>
                    <input type="text" id="title" name="title" required placeholder="輸入公告標題" value="{{ announcement.title }}">
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="priority">優先級</label>
                        <select id="priority" name="priority">
                            <option value="普通" {% if announcement.priority == '普通' %}selected{% endif %}>普通</option>
                            <option value="重要" {% if announcement.priority == '重要' %}selected{% endif %}>重要</option>
                            <option value="緊急" {% if announcement.priority == '緊急' %}selected{% endif %}>緊急</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="status">狀態</label>
                        <select id="status" name="status">
                            <option value="已發佈" {% if announcement.status == '已發佈' %}selected{% endif %}>已發佈</option>
                            <option value="草稿" {% if announcement.status == '草稿' %}selected{% endif %}>草稿</option>
                        </select>
                    </div>
                </div>

                <div class="form-group">
                    <label for="content">公告內容 <span style="color: red;">*</span></label>
                    <textarea id="content" name="content" required placeholder="輸入公告內容...">{{ announcement.content }}</textarea>
                </div>

                <div class="form-actions">
                    <button type="submit" style="background-color: var(--primary); color: white;">更新公告</button>
                    <a href="/admin/announcements" style="background-color: var(--text-secondary); color: white; text-align: center;">取消</a>
                </div>
            </form>
            {% else %}
            <p>公告不存在。</p>
            <a class="button" href="/admin/announcements">返回公告列表</a>
            {% endif %}
        </section>
    </div>
</body>
</html>
